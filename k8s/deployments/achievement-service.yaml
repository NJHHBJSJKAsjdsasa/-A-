apiVersion: apps/v1
kind: Deployment
metadata:
  name: achievement-service
  namespace: doraemon-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: achievement-service
  template:
    metadata:
      labels:
        app: achievement-service
    spec:
      containers:
      - name: achievement-service
        image: doraemon/achievement-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: doraemon-config
        - secretRef:
            name: doraemon-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: achievement-service
  namespace: doraemon-platform
spec:
  selector:
    app: achievement-service
  ports:
  - port: 3004
    targetPort: 3004
